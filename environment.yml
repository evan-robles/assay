# Conda environment for chemkit. Solves on linux-64 / osx-64 / osx-arm64.
# ONE command installs EVERYTHING (all backends + all Python deps, no extras):
#
#     conda env create -f environment.yml
#     conda activate chemkit
#
# The conda-only pieces below (xtb, xtb-python, mopac, openbabel) CANNOT be
# pip-installed and must come from conda-forge. Everything pip-installable is a
# CORE dependency of the package (see pyproject.toml [project.dependencies]) and
# is pulled in automatically by the `-e .` line at the bottom of this file — so
# there are no optional extras to remember.
#
# Pins are minor-version FLOORS, not exact patch pins, so the solver finds a
# compatible build on every platform (an exact osx-arm64 lock does not resolve
# on the linux-64 CI runner). The EXACT versions that produced the validated
# results are recorded for reproducibility at the bottom of this file.
name: chemkit
channels:
  - conda-forge
dependencies:
  - python=3.12
  # External chemistry binaries (not pip-installable):
  - xtb>=6.7             # --method xtb (GFN2-xTB) — the CLI binary
  - xtb-python>=22       # the `import xtb` Python API chemkit drives for xtb
                         # (forces/optimizer/frontier/electrostatics paths need
                         #  it; the CLI-only fallback lacks get_forces()).
  - mopac>=22            # --method mopac (PM7)
  - openbabel>=3.1       # SMILES->3D, name resolution, confab conformers
  - rdkit>=2023.3        # structure handling (tasks/scan.py + benchmark driver);
                         # conda-forge is the reliable source (esp. on Aurora)
  - pytest>=8            # test runner (dev-only)
  - pip
  - pip:
      # Install the chemkit package itself in editable mode. This pulls in ALL
      # pip-installable runtime deps declared in pyproject.toml — mcp, ase, numpy,
      # pyscf, matplotlib, sella, rdkit, openai — so there is nothing to add here
      # by hand and no extras to select. One env = everything.
      - -e .

# ---------------------------------------------------------------------------
# Reproducibility record — the EXACT versions used to produce the committed
# regression-test and fidelity results (captured on osx-arm64, 2026-06-30):
#   python 3.12.13 · xtb 6.7.1 · mopac 23.2.5 · openbabel 3.1.0
#   mcp 1.27.2 · ase 3.28.0 · numpy 2.4.6 · pyscf 2.13.1 · matplotlib 3.10.9
# To reproduce those exactly on the same platform, pin these patch versions.
